<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CashQuest banner</title>
  <desc id="desc">CashQuest project banner with crafted map textures and clean technology labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#062B2A"/>
      <stop offset="0.52" stop-color="#0F3B45"/>
      <stop offset="1" stop-color="#102C4A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 96) rotate(90) scale(190)">
